<!DOCTYPE html>
<html lang="{{ data.i18n.lang|default('en') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ data.i18n.page_not_found|default('Page not found') }} | {{ data.name|default('Business') }}</title>
<meta name="robots" content="noindex">
<meta name="description" content="{{ data.i18n.page_not_found_meta|default('This page does not exist. Return to the home page.') }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='{{ data.theme.favicon_fill|default('%231a5276') }}'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='55' font-family='sans-serif'>{{ (data.name|default('S'))[0] }}</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{ data.theme.font_url|default('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap') }}" rel="stylesheet">
<style>
  :root{--primary:{{ data.theme.primary|default('#1a5276') }};--primary-light:{{ data.theme.primary_light|default('#2471a3') }};--dark:{{ data.theme.dark|default('#1c2833') }};--font-body:{{ data.theme.font_body|default("'DM Sans',sans-serif") }};--font-display:{{ data.theme.font_display|default("'Playfair Display',serif") }}}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font-body);display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fa;color:#2c3e50;text-align:center;padding:20px}
  h1{font-family:var(--font-display);font-size:4rem;color:var(--primary);margin-bottom:12px}
  p{font-size:1.1rem;margin-bottom:24px;color:#5d6d7e;max-width:400px}
  a{display:inline-block;padding:14px 32px;background:var(--primary);color:white;text-decoration:none;border-radius:12px;font-weight:600;transition:background .3s}
  a:hover{background:var(--primary-light)}
  a:focus-visible{outline:2px solid var(--primary);outline-offset:3px}
</style>
</head>
<body>
<main>
  <h1>404</h1>
  <p>{{ data.i18n.page_not_found_text|default('This page does not exist. It may have been moved or deleted.') }}</p>
  <a href="index.html">{{ data.i18n.back_to_home|default('Back to home') }}</a>
</main>
</body>
</html>
